<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fusion Feedback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3248;
      --text:      #e2e4f0;
      --muted:     #6b7094;
      --accent:    #7c6df8;
      --accent-h:  #9b8dff;
      --green:     #34d399;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --blue:      #60a5fa;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -.3px; }
    header p  { font-size: 13px; color: var(--muted); margin-left: auto; }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    /* ── Submit form ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
    }
    .card h2 { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 12px 14px;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
    .form-msg { font-size: 13px; color: var(--muted); flex: 1; }
    .form-msg.error { color: var(--red); }
    .form-msg.success { color: var(--green); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    button:hover  { background: var(--accent-h); }
    button:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Feed ── */
    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .feed-header h2 { font-size: 16px; font-weight: 600; }
    .feed-count { font-size: 13px; color: var(--muted); }

    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .empty span { display: block; font-size: 32px; margin-bottom: 8px; }

    /* ── Feedback item ── */
    .item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .item:hover { border-color: #3d4260; }

    .item-head {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }
    .item-content {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }
    .item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Badges ── */
    .badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .4px;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .badge-RECEIVED  { background: #2e3248; color: var(--muted); }
    .badge-ANALYZING { background: #1e3a5f; color: var(--blue);  }
    .badge-DONE      { background: #0d3a28; color: var(--green); }
    .badge-FAILED    { background: #3a1a1a; color: var(--red);   }

    .badge-ANALYZING { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .5; }
    }

    .chevron {
      color: var(--muted);
      font-size: 12px;
      transition: transform .2s;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .item.open .chevron { transform: rotate(180deg); }

    /* sentiment dot inside badge */
    .sentiment-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .dot-positive { background: var(--green); }
    .dot-neutral  { background: var(--yellow); }
    .dot-negative { background: var(--red); }

    /* ── Analysis panel ── */
    .item-body {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid var(--border);
    }
    .item.open .item-body { display: block; }

    .analysis {
      margin-top: 14px;
      display: grid;
      gap: 14px;
    }

    .analysis-row {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .analysis-row label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .analysis-row .value { font-size: 14px; }

    .feature-list { list-style: none; display: grid; gap: 6px; }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .feature-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .feature-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .4s ease;
    }
    .feature-conf { font-size: 11px; color: var(--muted); width: 30px; text-align: right; flex-shrink: 0; }

    .no-features { font-size: 13px; color: var(--muted); }

    .item-ts { font-size: 11px; color: var(--muted); margin-top: 10px; }

    .failed-msg { font-size: 13px; color: var(--red); margin-top: 10px; }
  </style>
</head>
<body>

<header>
  <div class="logo">💬</div>
  <h1>Fusion Feedback</h1>
  <p id="live-indicator"></p>
</header>

<main>

  <!-- Submit -->
  <div class="card">
    <h2>Submit Feedback</h2>
    <textarea id="content" placeholder="What's on your mind? Feature requests, bugs, general thoughts…"></textarea>
    <div class="form-row">
      <span class="form-msg" id="form-msg"></span>
      <button id="submit-btn" onclick="submitFeedback()">Send feedback</button>
    </div>
  </div>

  <!-- Feed -->
  <div class="feed-header">
    <h2>Feedback</h2>
    <span class="feed-count" id="feed-count"></span>
  </div>
  <div id="feed"></div>

</main>

<script>
  let items = [];
  let pollTimer = null;

  // ── Fetch all feedback ──────────────────────────────────────────────────────
  async function loadFeed() {
    try {
      const res  = await fetch(`${API}/feedback`);
      const data = await res.json();
      items = data.items || [];
      renderFeed();
      schedulePoll();
    } catch (e) {
      console.error('loadFeed error', e);
    }
  }

  function schedulePoll() {
    clearTimeout(pollTimer);
    const hasPending = items.some(i => i.status === 'RECEIVED' || i.status === 'ANALYZING');
    if (hasPending) {
      pollTimer = setTimeout(loadFeed, 2500);
      document.getElementById('live-indicator').textContent = '● live';
    } else {
      document.getElementById('live-indicator').textContent = '';
    }
  }

  // ── Render ──────────────────────────────────────────────────────────────────
  function renderFeed() {
    const feed  = document.getElementById('feed');
    const count = document.getElementById('feed-count');
    count.textContent = items.length ? `${items.length} item${items.length !== 1 ? 's' : ''}` : '';

    if (!items.length) {
      feed.innerHTML = `<div class="empty"><span>🫙</span>No feedback yet. Submit one above!</div>`;
      return;
    }

    // Preserve open state
    const openIds = new Set(
      [...feed.querySelectorAll('.item.open')].map(el => el.dataset.id)
    );

    feed.innerHTML = items.map(item => itemHTML(item, openIds.has(item.id))).join('');
  }

  function itemHTML(item, open) {
    const sentimentBadge = item.analysis ? `
      <span class="badge badge-DONE">
        <span class="sentiment-dot dot-${item.analysis.sentiment}"></span>${item.analysis.sentiment}
      </span>` : '';

    const analysisHTML = item.status === 'DONE' && item.analysis
      ? analysisPanel(item.analysis)
      : item.status === 'FAILED'
        ? `<div class="failed-msg">⚠ Analysis failed. <a href="#" onclick="retry('${item.id}');return false;" style="color:var(--red)">Retry</a></div>`
        : `<div class="item-ts" style="margin-top:10px;color:var(--muted);font-size:13px">Analysing… check back in a moment.</div>`;

    return `
    <div class="item ${open ? 'open' : ''}" data-id="${item.id}">
      <div class="item-head" onclick="toggleItem(this)">
        <div class="item-content">${escHtml(item.content)}</div>
        <div class="item-meta">
          ${sentimentBadge}
          <span class="badge badge-${item.status}">${item.status}</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="item-body">
        ${analysisHTML}
        <div class="item-ts">${new Date(item.created_at).toLocaleString()}</div>
      </div>
    </div>`;
  }

  function analysisPanel(a) {
    const features = a.feature_requests.length
      ? `<ul class="feature-list">
          ${a.feature_requests.map(f => `
            <li class="feature-item">
              <span style="flex:0 0 auto;max-width:55%;font-size:13px">${escHtml(f.title)}</span>
              <div class="feature-bar-wrap">
                <div class="feature-bar" style="width:${Math.round(f.confidence * 100)}%"></div>
              </div>
              <span class="feature-conf">${Math.round(f.confidence * 100)}%</span>
            </li>`).join('')}
         </ul>`
      : `<span class="no-features">None detected</span>`;

    return `
    <div class="analysis">
      <div class="analysis-row">
        <label>Actionable Insight</label>
        <div class="value">${escHtml(a.actionable_insight)}</div>
      </div>
      <div class="analysis-row">
        <label>Feature Requests</label>
        ${features}
      </div>
    </div>`;
  }

  // ── Interactions ────────────────────────────────────────────────────────────
  function toggleItem(head) {
    head.closest('.item').classList.toggle('open');
  }

  async function retry(id) {
    await fetch(`${API}/feedback/${id}/retry`, { method: 'POST' });
    loadFeed();
  }

  async function submitFeedback() {
    const ta  = document.getElementById('content');
    const msg = document.getElementById('form-msg');
    const btn = document.getElementById('submit-btn');
    const content = ta.value.trim();

    if (!content) { showMsg('Please write something first.', 'error'); return; }

    btn.disabled = true;
    msg.className = 'form-msg';
    msg.textContent = 'Sending…';

    try {
      const res  = await fetch(`${API}/feedback`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ content }),
      });
      const data = await res.json();

      if (res.status === 409) {
        showMsg('Already submitted — showing existing result.', 'error');
      } else if (res.ok) {
        ta.value = '';
        showMsg('Received! Analysing in the background…', 'success');
        items.unshift(data);
        renderFeed();
        schedulePoll();
      } else {
        showMsg(data.error || 'Something went wrong.', 'error');
      }
    } catch (e) {
      showMsg('Could not reach the server.', 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('form-msg');
    el.textContent = text;
    el.className = `form-msg ${type}`;
    setTimeout(() => { el.textContent = ''; el.className = 'form-msg'; }, 4000);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Keyboard shortcut: Cmd/Ctrl+Enter to submit ─────────────────────────────
  document.getElementById('content').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') submitFeedback();
  });

  // ── Config ──────────────────────────────────────────────────────────────────
  const API = 'http://localhost:3000';

  // ── Boot ────────────────────────────────────────────────────────────────────
  loadFeed();
</script>
</body>
</html>
